apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploymentwala

spec:
  replicas: 4

  selector:
    matchLabels:
      env: dev

  template:
    metadata:
      labels:
        env: dev

    spec:
      containers:
        - name: nginxcontainer
          image: nginx
          ports:
            - containerPort: 80

